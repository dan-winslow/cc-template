<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Content Manager</title>
    <meta name="description" content="Comedy Club content manager" />
    <meta name="keywords" content="decap cms, comedy club cms" />
  </head>
  <body>
    <script>
      (() => {
        const url = new URL(window.location.href);
        if (url.searchParams.has('location')) {
          url.searchParams.delete('location');
          window.history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
        }
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        const tokenFlow = /(invite_token|confirmation_token|recovery_token|email_change_token)=/i.test(window.location.hash || '');
        window.netlifyIdentity.on('init', (user) => {
          if (tokenFlow && !user) {
            window.netlifyIdentity.open('signup');
          }
          if (!user) {
            window.netlifyIdentity.on('login', () => {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
  </body>
</html>
