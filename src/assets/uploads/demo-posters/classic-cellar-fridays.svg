  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#130d15"/>
      <stop offset="100%" stop-color="#2c1020"/>
    </linearGradient>
  </defs>
  <rect width="700" height="900" fill="url(#bg)"/>
  <rect x="48" y="48" width="604" height="804" fill="none" stroke="#ff4d8a" stroke-width="3"/>
  <text x="70" y="120" fill="#ff7db0" font-family="Arial Black, Arial" font-size="46">SPECIAL EVENT</text>
  <text x="70" y="280" fill="#f8efff" font-family="Arial Black, Arial" font-size="86">CELLAR</text>
  <text x="70" y="360" fill="#f8efff" font-family="Arial Black, Arial" font-size="86">FRIDAYS</text>
